{{define "layout"}}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Ledger — Backoffice de Operações</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">
    <nav class="bg-slate-950 border-b border-slate-800 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center font-bold text-slate-950">L</div>
                <span class="text-lg font-bold text-sky-400">Ledger Engine Backoffice</span>
            </div>
            <div class="space-x-6 text-sm font-medium">
                <a href="/backoffice/dashboard" class="text-slate-300 hover:text-white transition py-2 border-b-2 border-transparent hover:border-sky-500">Dashboard</a>
                <a href="/backoffice/dlq" class="text-slate-300 hover:text-white transition py-2 border-b-2 border-transparent hover:border-sky-500">Mensagens & DLQ</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8 flex-1 w-full">
        {{template "content" .}}
    </main>
    <footer class="py-6 border-t border-slate-800 text-center text-slate-500 text-sm">
        &copy; 2026 Distributed Ledger System - Staff Engineering
    </footer>
</body>
</html>
{{end}}
